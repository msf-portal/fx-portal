<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>アラート 案内</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1 class="h1">アラート：ログイン後のご案内</h1>
      <p class="muted">ここはアラート入口専用の認証ページです。</p>

      <hr class="hr" />

      <h2 class="h2">1. Discordで認証</h2>
      <p class="muted">
        Discordサーバーに参加後、認証チャンネルでBotに認証してください。<br />
        （例）/verify を実行
      </p>

      <h2 class="h2">2. Discordサーバー参加</h2>

      <div id="lockedArea">
        <p class="muted">
          下のボタンからDiscordサーバーに参加してください。
        </p>

        <a class="btn" href="https://discord.gg/W7UaJg3r62" target="_blank">
          Discordサーバーに参加
        </a>

        <p class="note">
          参加後、認証チャンネルで /verify を実行してください。
        </p>
      </div>

      <h2 class="h2">3. 問い合わせ</h2>
      <p class="muted">
        問い合わせ時は、メールアドレス／DiscordユーザーID／利用サービス（アラート）を添えてください。
      </p>

      <div class="stack" style="margin-top:16px;">
        <button class="btn" id="logoutBtn">ログアウト</button>
        <a class="btn ghost" href="../index.html">トップへ戻る</a>
      </div>
    </section>
  </main>

  <script src="../assets/config.js"></script>
  <script src="../assets/auth.js"></script>
  <script>
    window.Auth.requireLogin("alert", "./login.html");

    document.getElementById("logoutBtn").addEventListener("click", function () {
      window.Auth.logout("alert");
      window.location.href = "./login.html";
    });
  </script>
</body>
</html>
